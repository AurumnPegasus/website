{{- range . -}}
<a href="{{ .url | safeURL }}" target="_blank" rel="noopener me" title="{{ .name | humanize }}">
	{{- if eq .name "x" -}}
	<svg xmlns="http://www.w3.org/2000/svg" class="feather" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16"></path><path d="M20 4 4 20"></path></svg>
	{{- else -}}
	{{ partial "svg.html" . }}
	{{- end -}}
</a>
{{- end -}}
